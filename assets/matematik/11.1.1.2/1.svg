<svg width="420" height="420" viewBox="0 0 420 420">

  <!-- Glow efekti -->
  <defs>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowOrange">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Merkez -->
  <circle cx="210" cy="210" r="4" fill="white"/>

  <!-- Çember (yarıçap r) -->
  <circle cx="210" cy="210" r="140"
          stroke="#4FC3FF"
          stroke-width="3"
          fill="none"
          filter="url(#glowBlue)"/>

  <!-- Noktalar -->
  <!-- A noktası (0 derece) -->
  <circle cx="350" cy="210" r="5" fill="white"/>
  <text x="360" y="215" fill="white">A</text>

  <!-- B noktası (1 radyan açıya göre) -->
  <!-- x = r cos(1), y = r sin(1) -->
  <circle cx="289" cy="338" r="5" fill="white"/>
  <text x="299" y="348" fill="white">B</text>

  <!-- O noktası -->
  <text x="200" y="215" fill="white">O</text>

  <!-- Radyuslar -->
  <line x1="210" y1="210" x2="350" y2="210"
        stroke="white" stroke-width="2"/>

  <line x1="210" y1="210" x2="289" y2="338"
        stroke="white" stroke-width="2"/>

  <!-- Yay (AOB = 1 radian) -->
  <path d="M 350 210
           A 140 140 0 0 1 289 338"
        fill="none"
        stroke="#FFB74D"
        stroke-width="4"
        filter="url(#glowOrange)"/>

  <!-- Açı etiketi -->
  <path d="M 250 210
           A 40 40 0 0 1 245 245"
        fill="#4FC3FF"
        opacity="0.5"/>

  <text x="240" y="240" fill="#4FC3FF">1 rad</text>

</svg>
